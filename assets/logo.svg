<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300"
     viewBox="0 0 300 300"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-labelledby="title desc">

  <title id="title">Colorado Springs Public Education Advocates</title>
  <desc id="desc">Simple logo with mountains, an open book, and three interlocking circles.</desc>

  <!-- Background (optional) -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Mountain silhouette -->
  <polygon points="30,250 120,120 210,250"
           fill="#4A90E2"/> <!-- sky‑blue -->

  <!-- Open book (centered over the mountain) -->
  <g transform="translate(150,180) scale(0.8)">
    <path d="M -70 -20 L -30 -20 L -30 20 L -70 20 Z"
          fill="#F5A623"/> <!-- sunrise‑orange -->
    <path d="M 30 -20 L 70 -20 L 70 20 L 30 20 Z"
          fill="#F5A623"/>
    <path d="M -30 -20 L 30 -20 L 30 20 L -30 20 Z"
          fill="none" stroke="#4A90E2" stroke-width="4"/>
  </g>

  <!-- Interlocking circles (educators, parents, students) -->
  <g fill="none" stroke="#7ED321" stroke-width="8">
    <circle cx="100" cy="100" r="45"/>
    <circle cx="150" cy="100" r="45"/>
    <circle cx="125" cy="145" r="45"/>
  </g>

  <!-- Group name (optional) -->
  <text x="150" y="280"
        font-family="Helvetica, Arial, sans-serif"
        font-size="24"
        fill="#333"
        text-anchor="middle">
    Colorado Springs EDU Advocates
  </text>
</svg>
